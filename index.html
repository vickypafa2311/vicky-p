<html lang="el"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vicky Pafa | Minimal Portfolio</title>
    <style>
        /* Minimalist Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #ffffff;
            color: #000000;
            padding: 60px 8%;
        }
        header {
            margin-bottom: 80px;
        }
        .logo {
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-decoration: none;
            color: #000000;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 40px;
            row-gap: 100px;
            align-items: center;
        }
        .item {
            position: relative;
            overflow: hidden;
            transition: opacity 0.3s ease;
            cursor: pointer; /* Δείχνει χεράκι ότι η εικόνα είναι κλικάσιμη */
        }
        .item:hover {
            opacity: 0.85;
        }
        .item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }
        .item-1 {
            grid-column: 1 / span 4;
        }
        .item-2 {
            grid-column: 5 / span 3;
            margin-top: -60px;
        }
        .item-3 {
            grid-column: 8 / span 5;
            margin-top: 100px;
        }
        .item-4 {
            grid-column: 1 / span 3;
            margin-top: 60px;
        }
        .item-5 {
            grid-column: 4 / span 4;
            margin-top: -40px;
        }
        .item-6 {
            grid-column: 4 / span 5;
            margin-top: 80px;
        }

        /* --- LIGHTBOX STYLING --- */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.98); /* Minimal λευκό ημιδιάφανο φόντο */
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            cursor: zoom-out;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05); /* Πολύ απαλή σκιά */
            transform: scale(0.97);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lightbox.active img {
            transform: scale(1);
        }

        @media (max-width: 768px) {
            body {
                padding: 40px 20px;
            }
            .grid {
                display: flex;
                flex-direction: column;
                gap: 60px;
            }
            .item {
                margin: 0 !important;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo">Vicky Pafa</a>
    </header>
    <main class="grid">
        <div class="item item-1">
            <img src="dog_web.jpg" alt="Cosmote TELEKOM Όλα συνδέονται, όλοι κερδίζουν"> 
        </div>
        <div class="item item-2">
            <img src="EOT_GreeceMedals_OOH_120x190_01_ENG-03.jpg" alt="ΕΟΤ Ολυμπιακοί αγώνες Παρίσι 2025">
        </div>
        <div class="item item-3">
            <img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&amp;w=1000&amp;auto=format&amp;fit=crop" alt="Minimal Living Room">
        </div>
        <div class="item item-4">
            <img src="https://images.unsplash.com/photo-1600566753376-12c8ab7fb75b?q=80&amp;w=800&amp;auto=format&amp;fit=crop" alt="Architecture Stairs">
        </div>
        <div class="item item-5">
            <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&amp;w=800&amp;auto=format&amp;fit=crop" alt="White Interior">
        </div>
        <div class="item item-6">
            <img src="https://images.unsplash.com/photo-1618219908412-a29a1bb7b86e?q=80&amp;w=1000&amp;auto=format&amp;fit=crop" alt="Modern Sofa">
        </div>
    </main>

    <!-- Lightbox Container -->
    <div class="lightbox" id="lightbox">
        <img src="" alt="Enlarged view">
    </div>

    <!-- Lightbox Script -->
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = lightbox.querySelector('img');
        const gridItems = document.querySelectorAll('.item img');

        // Όταν κάνεις κλικ σε μια εικόνα, άνοιξε το Lightbox
        gridItems.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightboxImg.alt = img.alt;
                lightbox.classList.add('active');
            });
        });

        // Όταν κάνεις κλικ οπουδήποτε στο Lightbox, κλείσε το
        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('active');
        });
    </script>

</body></html>
